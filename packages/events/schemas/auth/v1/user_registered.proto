syntax = "proto3";

package next.events.auth.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/next-ecosystem/next/gen/go/auth/v1;authv1";

// UserRegistered fires when auth-service finalises a new user.
// Consumers (profile-service first) use this to materialise downstream state.
// Partition key on the wire: user_id.
message UserRegistered {
  string event_id    = 1 [(buf.validate.field).string.uuid = true];
  google.protobuf.Timestamp emitted_at = 2;

  string user_id     = 3 [(buf.validate.field).string.uuid = true];
  string handle      = 4 [(buf.validate.field).string.min_len = 3, (buf.validate.field).string.max_len = 30];
  string display_name = 5;
  string ip_country  = 6;
}
