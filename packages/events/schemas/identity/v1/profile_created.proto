syntax = "proto3";

package next.events.identity.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/next-ecosystem/next/gen/go/next/events/identity/v1;identityeventsv1";

// ProfileCreated is emitted by profile-service after materializing a user profile.
// Category stream: identity.events.v1. Partition key: user_id.
message ProfileCreated {
  string event_id = 1 [(buf.validate.field).string.uuid = true];
  google.protobuf.Timestamp emitted_at = 2 [(buf.validate.field).required = true];

  string user_id = 3 [(buf.validate.field).string.uuid = true];
  string handle = 4 [(buf.validate.field).string.min_len = 3, (buf.validate.field).string.max_len = 30];
  string display_name = 5 [(buf.validate.field).string.max_len = 80];
  string source_event_id = 6;
  google.protobuf.Timestamp created_at = 7;
}
