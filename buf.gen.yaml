# NEXT — Buf generation config. Phase 1 only emits Go for the running services;
# TS / Python / Rust will be added back when those workspaces start consuming.

version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/next-ecosystem/next/gen/go

plugins:
  # ---- Go (protobuf + gRPC) ----
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: gen/go
    opt: paths=source_relative
    include_imports: true
  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
