# NEXT monorepo — pnpm workspace declaration
# JS/TS workspaces. Go uses go.work, Rust uses Cargo workspace, Python uses uv workspace.
packages:
  - "apps/*"
  - "packages/*"
  - "services/*/clients/typescript"
  - "tooling/*"

# Catalog: single source of truth for dependency versions across the monorepo.
# Workspaces reference catalog entries via `catalog:` protocol to guarantee alignment.
catalog:
  # React + Next.js
  react: ^19.0.0
  react-dom: ^19.0.0
  next: ^15.1.0
  "@types/react": ^19.0.0
  "@types/react-dom": ^19.0.0

  # TypeScript
  typescript: ^5.6.3
  tsx: ^4.19.1
  tsup: ^8.3.0

  # Styling
  tailwindcss: ^3.4.13
  "@tailwindcss/typography": ^0.5.15
  postcss: ^8.4.47
  autoprefixer: ^10.4.20

  # Motion + 3D
  framer-motion: ^11.11.0
  three: ^0.170.0
  "@react-three/fiber": ^9.5.0
  "@react-three/drei": ^10.7.7
  "@types/three": ^0.170.0

  # GraphQL
  graphql: ^16.9.0
  "@apollo/client": ^3.11.10
  "@apollo/server": ^4.11.0
  "@apollo/gateway": ^2.9.0

  # gRPC + Protobuf
  "@grpc/grpc-js": ^1.12.2
  "@grpc/proto-loader": ^0.7.13
  "@bufbuild/protobuf": ^2.2.0

  # State
  zustand: ^5.0.0
  "@tanstack/react-query": ^5.59.0

  # Telemetry
  "@opentelemetry/api": ^1.9.0
  "@opentelemetry/sdk-node": ^0.54.0
  "@opentelemetry/auto-instrumentations-node": ^0.52.0

  # Logging
  pino: ^9.5.0
  "pino-pretty": ^11.3.0

  # Validation
  zod: ^3.23.8

  # Testing
  vitest: ^2.1.2
  "@vitest/coverage-v8": ^2.1.2
  "@testing-library/react": ^16.0.1
  playwright: ^1.48.0
  "@playwright/test": ^1.48.0

  # Linting
  eslint: ^9.12.0
  "@typescript-eslint/parser": ^8.8.1
  "@typescript-eslint/eslint-plugin": ^8.8.1
  "eslint-config-prettier": ^9.1.0
  "eslint-plugin-react": ^7.37.1
  "eslint-plugin-react-hooks": ^5.0.0

# Scoped overrides: pin React 18 inside @next/mobile's dependency subgraph only.
# RN 0.76 / Expo 52 peer-dep on react@18; the rest of the monorepo stays on the
# catalog's react@19. pnpm honors `overrides` only at workspace root, so this
# lives here (not in apps/mobile/package.json) despite being mobile-scoped.
overrides:
  "@next/mobile>react": "18.3.1"
  "@next/mobile>react-dom": "18.3.1"
  "@next/mobile>@types/react": "~18.3.12"

# pnpm-specific config
peerDependencyRules:
  ignoreMissing:
    - "@types/react"
    - "@types/react-dom"
  allowedVersions:
    # Mobile is on react 18 (RN 0.76 constraint); web/immersive are on react 19.
    # Both must be accepted to silence peer warnings across the workspace.
    react: "18 || 19"
    react-dom: "18 || 19"
    "@types/react": "18 || 19"
    # fiber@9 peers on react-native>=0.78 (optional). Mobile is intentionally on
    # 0.76 (latest stable Expo 52 target). Accept the older RN to silence the
    # workspace-wide warning fiber emits when scanning mobile's RN install.
    react-native: "0.76 || >=0.78"

# Enable strict peer dep resolution
strict-peer-dependencies: false
auto-install-peers: true
