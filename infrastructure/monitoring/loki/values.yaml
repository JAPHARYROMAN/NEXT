# Loki Helm values — scalable mode, S3 backend.

loki:
  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index: { prefix: index_, period: 24h }
  storage:
    type: s3
    bucketNames:
      chunks: next-loki-chunks-prod
      ruler: next-loki-ruler-prod
      admin: next-loki-admin-prod
    s3:
      region: us-east-1
  limits_config:
    retention_period: 30d
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100
    max_query_parallelism: 32
  compactor:
    retention_enabled: true
    delete_request_store: s3
  ruler:
    storage: { type: s3 }

backend:    { replicas: 3, resources: { requests: { cpu: 500m, memory: 2Gi }, limits: { cpu: 2, memory: 8Gi } } }
write:      { replicas: 3, resources: { requests: { cpu: 1,    memory: 4Gi }, limits: { cpu: 4, memory: 16Gi } } }
read:       { replicas: 3, resources: { requests: { cpu: 1,    memory: 4Gi }, limits: { cpu: 4, memory: 16Gi } } }
chunksCache: { allocatedMemory: 4096 }
resultsCache: { allocatedMemory: 1024 }

gateway:
  enabled: true
  replicas: 3
