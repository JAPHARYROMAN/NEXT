# OpenTelemetry Collector — agent tier. Runs as DaemonSet, ingests local OTLP +
# node metrics, forwards to the cluster gateway.

apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: agent
  namespace: next-observability
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.112.0
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 1Gi }
  config:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
      hostmetrics:
        collection_interval: 30s
        scrapers:
          cpu: {}
          memory: {}
          disk: {}
          filesystem: {}
          network: {}
          load: {}
          paging: {}

    processors:
      batch: { send_batch_size: 4096, timeout: 5s }
      memory_limiter: { check_interval: 1s, limit_percentage: 80 }
      k8sattributes: { passthrough: false }

    exporters:
      otlp/gateway:
        endpoint: otel-collector-gateway.next-observability:4317
        tls: { insecure: true }

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp/gateway]
        metrics:
          receivers: [otlp, hostmetrics]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp/gateway]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp/gateway]
