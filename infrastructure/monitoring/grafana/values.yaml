# Grafana Helm values. Dashboards + datasources provisioned as code.

replicas: 2

persistence:
  enabled: true
  storageClassName: gp3
  size: 20Gi

adminUser: admin
admin:
  existingSecret: grafana-admin

grafana.ini:
  server: { root_url: https://grafana.next.io }
  auth:
    disable_login_form: true
  auth.generic_oauth:
    enabled: true
    name: NEXT SSO
    allow_sign_up: true
    auto_login: true
    scopes: openid profile email groups
    auth_url: https://auth.next.io/oauth/authorize
    token_url: https://auth.next.io/oauth/token
    api_url: https://auth.next.io/userinfo

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.next-observability:9090
        isDefault: true
      - name: Tempo
        type: tempo
        url: http://tempo-query-frontend.next-observability:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          tracesToMetrics:
            datasourceUid: prometheus
      - name: Loki
        type: loki
        url: http://loki-gateway.next-observability
        jsonData:
          derivedFields:
            - { datasourceUid: tempo, matcherRegex: "trace_id=(\\w+)", name: TraceID, url: "$${__value.raw}" }

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: next
        orgId: 1
        folder: NEXT
        type: file
        disableDeletion: false
        editable: false
        options:
          path: /var/lib/grafana/dashboards/next
