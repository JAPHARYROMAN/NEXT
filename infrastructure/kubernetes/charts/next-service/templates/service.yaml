apiVersion: v1
kind: Service
metadata:
  name: {{ include "next-service.fullname" . }}
  labels: {{- include "next-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "next-service.selectorLabels" . | nindent 4 }}
  ports:
    - { name: http,    port: {{ .Values.ports.http }},    targetPort: http,    protocol: TCP }
    - { name: grpc,    port: {{ .Values.ports.grpc }},    targetPort: grpc,    protocol: TCP, appProtocol: grpc }
    - { name: metrics, port: {{ .Values.ports.metrics }}, targetPort: metrics, protocol: TCP }
