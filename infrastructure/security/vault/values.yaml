# Vault Helm values — HA, Raft, KMS auto-unseal.

server:
  ha:
    enabled: true
    replicas: 5
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true
        listener "tcp" {
          tls_disable = 0
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file = "/vault/userconfig/vault-server-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-server-tls/tls.key"
        }
        storage "raft" {
          path = "/vault/data"
          retry_join { leader_api_addr = "https://vault-0.vault-internal:8200" }
          retry_join { leader_api_addr = "https://vault-1.vault-internal:8200" }
          retry_join { leader_api_addr = "https://vault-2.vault-internal:8200" }
          retry_join { leader_api_addr = "https://vault-3.vault-internal:8200" }
          retry_join { leader_api_addr = "https://vault-4.vault-internal:8200" }
        }
        seal "awskms" {
          region = "us-east-1"
          kms_key_id = "alias/next-vault-unseal"
        }
        service_registration "kubernetes" {}
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/next-vault
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2,    memory: 4Gi }
  dataStorage:
    enabled: true
    storageClass: gp3
    size: 100Gi
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: vault }
          topologyKey: topology.kubernetes.io/zone

injector:
  enabled: false   # We use External Secrets Operator (ESO), not the injector.

ui:
  enabled: true
  serviceType: ClusterIP
