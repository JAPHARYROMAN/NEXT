syntax = "proto3";

package next.mediasearch.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/next-ecosystem/next/gen/go/mediasearch/v1;mediasearchv1";

// MediaSearchService serves hybrid lexical + semantic video search.
service MediaSearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Suggest(SuggestRequest) returns (SuggestResponse);
  rpc Index(IndexRequest) returns (IndexResponse);
}

message SearchFilters {
  string creator_id     = 1;
  string language       = 2;
  uint32 max_duration_s = 3;
  repeated string tags  = 4;
}

message Hit {
  string video_id  = 1;
  string title     = 2;
  double score     = 3;
  string thumbnail_url = 4;
}

message Document {
  string title        = 1;
  string description  = 2;
  repeated string tags = 3;
  string transcript   = 4;
  repeated float embedding = 5;
}

message SearchRequest {
  string query          = 1 [(buf.validate.field).string.min_len = 1];
  SearchFilters filters = 2;
  uint32 page           = 3;
  uint32 page_size      = 4 [(buf.validate.field).uint32.lte = 100];
}
message SearchResponse {
  repeated Hit hits = 1;
  uint32 total      = 2;
  string next_cursor = 3;
}

message SuggestRequest { string prefix = 1 [(buf.validate.field).string.min_len = 1]; }
message SuggestResponse { repeated string suggestions = 1; }

message IndexRequest {
  string video_id   = 1 [(buf.validate.field).string.uuid = true];
  Document document = 2;
}
message IndexResponse {}
