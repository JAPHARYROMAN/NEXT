syntax = "proto3";

package next.upload.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/next-ecosystem/next/gen/go/upload/v1;uploadv1";

// UploadService implements resumable, chunked upload (TUS-aligned).
service UploadService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc PutChunk(PutChunkRequest) returns (PutChunkResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc Finalize(FinalizeRequest) returns (FinalizeResponse);
}

message UploadSession {
  string id            = 1;
  string creator_id    = 2;
  string content_type  = 3;
  int64  total_bytes   = 4;
  int64  committed_bytes = 5;   // highest contiguous offset received
  string state         = 6;     // open|finalizing|completed|failed
  string object_key    = 7;     // S3 key once finalized
  google.protobuf.Timestamp created_at = 8;
}

message CreateSessionRequest {
  string creator_id   = 1 [(buf.validate.field).string.min_len = 1];
  string content_type = 2 [(buf.validate.field).string.min_len = 1];
  int64  total_bytes  = 3 [(buf.validate.field).int64.gt = 0];
  string filename     = 4;
}
message CreateSessionResponse { UploadSession session = 1; }

message PutChunkRequest {
  string session_id = 1 [(buf.validate.field).string.uuid = true];
  int64  offset     = 2 [(buf.validate.field).int64.gte = 0];
  bytes  data       = 3 [(buf.validate.field).bytes.min_len = 1];
}
message PutChunkResponse {
  int64 committed_bytes = 1;   // new highest contiguous offset
}

message GetSessionRequest { string session_id = 1 [(buf.validate.field).string.uuid = true]; }
message GetSessionResponse { UploadSession session = 1; }

message FinalizeRequest { string session_id = 1 [(buf.validate.field).string.uuid = true]; }
message FinalizeResponse {
  string object_key = 1;
  int64  total_bytes = 2;
}
