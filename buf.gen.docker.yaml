# NEXT Docker image codegen config.
# Uses local plugins installed by services/_template/Dockerfile so image
# builds do not depend on BSR remote plugin downloads for every service.

version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/next-ecosystem/next/gen/go

plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
    include_imports: true
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
