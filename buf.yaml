# NEXT — Buf module config for protobuf governance.
# Each domain owns its proto files; this file enumerates the modules.

version: v2
modules:
  - path: services/auth-service/proto
    name: buf.build/next-ecosystem/auth
  - path: services/profile-service/proto
    name: buf.build/next-ecosystem/profile
  - path: services/session-service/proto
    name: buf.build/next-ecosystem/session
  - path: services/access-control-service/proto
    name: buf.build/next-ecosystem/accesscontrol
  - path: services/trust-service/proto
    name: buf.build/next-ecosystem/trust
  - path: services/device-graph-service/proto
    name: buf.build/next-ecosystem/devicegraph
  - path: services/creator-identity-service/proto
    name: buf.build/next-ecosystem/creatoridentity
  - path: services/account-recovery-service/proto
    name: buf.build/next-ecosystem/accountrecovery
  - path: services/notification-auth-service/proto
    name: buf.build/next-ecosystem/notificationauth
  - path: services/identity-graph-service/proto
    name: buf.build/next-ecosystem/identitygraph
  - path: services/upload-service/proto
    name: buf.build/next-ecosystem/upload
  - path: services/media-service/proto
    name: buf.build/next-ecosystem/media
  - path: services/transcoding-service/proto
    name: buf.build/next-ecosystem/transcoding
  - path: services/media-processing-orchestrator/proto
    name: buf.build/next-ecosystem/orchestrator
  - path: services/playback-service/proto
    name: buf.build/next-ecosystem/playback
  - path: services/cdn-routing-service/proto
    name: buf.build/next-ecosystem/cdnrouting
  - path: services/media-metadata-service/proto
    name: buf.build/next-ecosystem/mediametadata
  - path: services/thumbnail-service/proto
    name: buf.build/next-ecosystem/thumbnail
  - path: services/subtitle-service/proto
    name: buf.build/next-ecosystem/subtitle
  - path: services/media-search-service/proto
    name: buf.build/next-ecosystem/mediasearch
  - path: services/video-segmentation-service/proto
    name: buf.build/next-ecosystem/videosegmentation
  - path: services/clip-generation-service/proto
    name: buf.build/next-ecosystem/clipgeneration
  - path: services/media-analytics-service/proto
    name: buf.build/next-ecosystem/mediaanalytics
  - path: services/recommendation-service/proto
    name: buf.build/next-ecosystem/recommendation
  - path: services/feed-service/proto
    name: buf.build/next-ecosystem/feed
  - path: services/discovery-service/proto
    name: buf.build/next-ecosystem/discovery
  - path: services/personalization-service/proto
    name: buf.build/next-ecosystem/personalization
  - path: services/ranking-service/proto
    name: buf.build/next-ecosystem/ranking
  - path: services/candidate-generation-service/proto
    name: buf.build/next-ecosystem/candidategen
  - path: services/semantic-retrieval-service/proto
    name: buf.build/next-ecosystem/semanticretrieval
  - path: packages/events/schemas
    name: buf.build/next-ecosystem/events

breaking:
  use:
    - FILE
  except:
    - FIELD_NO_DELETE

lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    - PACKAGE_DIRECTORY_MATCH
  enum_zero_value_suffix: _UNSPECIFIED
  service_suffix: Service
  rpc_allow_same_request_response: false
  rpc_allow_google_protobuf_empty_requests: false
  rpc_allow_google_protobuf_empty_responses: false

deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate
