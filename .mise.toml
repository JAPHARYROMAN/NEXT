# NEXT — runtime version manager config (mise.jdx.dev)
# Pins toolchain versions across the polyglot monorepo.

[tools]
node = "22.10.0"
pnpm = "9.12.0"
go = "1.25.0"
rust = "1.91.1"
python = "3.12.7"
uv = "0.4.27"
terraform = "1.9.8"
kubectl = "1.31.1"
helm = "3.16.2"
argocd = "2.13.0"
"go-task" = "3.39.2"
"aqua:buf-build/buf" = "1.45.0"
"aqua:protocolbuffers/protobuf" = "28.3"

[env]
GOPRIVATE = "github.com/next-ecosystem/*"
RUST_BACKTRACE = "1"

[settings]
experimental = true
legacy_version_file = true
