# NEXT local dev dependencies. Starts the data tier + observability so engineers
# can run services locally against realistic backends. Brought up by `task dev:up`.

services:
  postgres:
    # Host port 5433 — avoids collisions with any native Postgres service on 5432.
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: next
      POSTGRES_PASSWORD: next
      POSTGRES_DB: next
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "next"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    # Host port 6380 — same reason; native Redis often takes 6379.
    image: redis:7.4-alpine
    ports: ["6380:6379"]
    command: ["redis-server", "--appendonly", "yes"]

  kafka:
    # Two listeners: PLAINTEXT for in-cluster (other compose services use kafka:9092),
    # EXTERNAL for host-side clients (auth-service running on the host uses
    # localhost:9094). Same broker either way.
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "next-local-cluster"
    ports: ["9092:9092", "9094:9094"]
    volumes: [kafkadata:/var/lib/kafka/data]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    depends_on: [kafka]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports: ["8081:8081"]

  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    ports: ["8123:8123", "9000:9000"]
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes: [chdata:/var/lib/clickhouse]

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports: ["9200:9200"]
    volumes: [osdata:/usr/share/opensearch/data]

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrantdata:/qdrant/storage]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes: [./infrastructure/monitoring/otel-collector/local.yaml:/etc/otel/config.yaml:ro]
    ports: ["4317:4317", "4318:4318"]

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    # 16686 = Jaeger UI; 4319 (host) -> 4317 (container) is Jaeger's own OTLP gRPC
    # receiver. We expose it under a different host port so the otel-collector can
    # keep the canonical 4317.
    ports: ["16686:16686", "4319:4317"]

  prometheus:
    image: prom/prometheus:v2.55.0
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports: ["3001:3000"]
    depends_on: [prometheus, jaeger]

volumes:
  pgdata: {}
  kafkadata: {}
  chdata: {}
  osdata: {}
  qdrantdata: {}
