name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly Mon 06:00 UTC

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        if: matrix.language == 'go'
        with:
          go-version-file: go.work
          cache: false
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Go requires 'manual' or 'autobuild'; interpreted languages use 'none'.
          build-mode: ${{ matrix.language == 'go' && 'manual' || 'none' }}
      # Manual Go build sequence so CodeQL can trace compilation.
      # go-work-run.mjs iterates every workspace module, skipping stub services
      # that contain no Go source ("matched no packages"). gen/go is committed,
      # so no extra codegen is required at this stage.
      - name: Build Go workspace for CodeQL tracing
        if: matrix.language == 'go'
        run: node scripts/go-work-run.mjs test
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    # Requires Dependency Graph enabled: Settings → Security → Dependency graph
    # Until enabled this job is informational only and must not block merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with: { fail-on-severity: high }

  semgrep:
    name: semgrep
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten p/security-audit p/secrets p/typescript p/golang p/python"

  trivy-fs:
    name: Trivy filesystem
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif }

  gitleaks:
    name: Secrets scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
