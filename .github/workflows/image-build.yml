name: Image build

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "ai/**"
      - "apps/**"
      - "packages/go/**"
      - "packages/rust/**"
      - ".github/workflows/image-build.yml"
  workflow_dispatch:
    inputs:
      service: { description: "Service name", required: true }

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - profile-service
          - media-service
          - upload-service
          - live-service
          - feed-service
          - recommendation-service
          - search-service
          - community-service
          - payment-service
          - notification-service
          - moderation-service
          - analytics-service
          - event-gateway
          - api-gateway
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI image references must be lowercase. ${{ github.repository_owner }}
      # preserves the GitHub login casing (e.g. JAPHARYROMAN), which is a
      # valid GitHub login but an invalid OCI reference and causes
      # `cosign sign` and trivy image scans to fail with malformed digest
      # errors. Lowercase once here and reuse for metadata, signing, and
      # scanning so every step targets the same digest.
      - name: Resolve lowercase image reference
        id: refs
        shell: bash
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/next/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.refs.outputs.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: services/_template/Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
            GO_VERSION=1.25.0
            ALPINE_VERSION=3.22
            BUF_VERSION=1.45.0
            PROTOC_GEN_GO_VERSION=v1.34.2
            PROTOC_GEN_GO_GRPC_VERSION=v1.5.1
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          push: true

      # ----- Sign + scan -----
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ${{ steps.refs.outputs.image }}@${{ steps.build.outputs.digest }}

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.refs.outputs.image }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
