name: Image build

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "ai/**"
      - "apps/**"
      - "packages/go/**"
      - "packages/rust/**"
      - ".github/workflows/image-build.yml"
  workflow_dispatch:
    inputs:
      service: { description: "Service name", required: true }

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - profile-service
          - media-service
          - upload-service
          - live-service
          - feed-service
          - recommendation-service
          - search-service
          - community-service
          - payment-service
          - notification-service
          - moderation-service
          - analytics-service
          - event-gateway
          - api-gateway
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/next/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: services/_template/Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          push: true

      # ----- Sign + scan -----
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/next/${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/next/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-${{ matrix.service }}.sarif }
